# Uvicorn logging — access lines include date/time (Asia/Shanghai via container TZ).
version: 1
disable_existing_loggers: false
filters:
  suppress_health_access:
    (): memory_engine.config.SuppressHealthAccessLogFilter
formatters:
  default:
    (): uvicorn.logging.DefaultFormatter
    fmt: "%(asctime)s %(levelprefix)s %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
    use_colors: false
  access:
    (): uvicorn.logging.AccessFormatter
    fmt: '%(asctime)s %(levelprefix)s %(client_addr)s - "%(request_line)s" %(status_code)s'
    datefmt: "%Y-%m-%d %H:%M:%S"
handlers:
  default:
    formatter: default
    class: logging.StreamHandler
    stream: ext://sys.stderr
  access:
    formatter: access
    class: logging.StreamHandler
    stream: ext://sys.stdout
    filters: [suppress_health_access]
loggers:
  uvicorn:
    handlers: [default]
    level: INFO
    propagate: false
  uvicorn.error:
    level: INFO
  uvicorn.access:
    handlers: [access]
    level: INFO
    propagate: false
  memory_engine:
    handlers: [default]
    level: INFO
    propagate: false
