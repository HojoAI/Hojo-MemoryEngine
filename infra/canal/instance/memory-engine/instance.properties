# MemoryEngine Canal instance — mount to canal-server /home/admin/canal-server/conf/memory-engine/
canal.instance.gtidon=false
canal.instance.tsdb.enable=true

canal.instance.master.address=${CANAL_MYSQL_HOST:-host.docker.internal}:${CANAL_MYSQL_PORT:-3306}
canal.instance.dbUsername=${CANAL_MYSQL_USER:-root}
canal.instance.dbPassword=${CANAL_MYSQL_PASSWORD:-}
canal.instance.connectionCharset=UTF-8
canal.instance.defaultDatabaseName=${CANAL_MYSQL_DATABASE:-memory_engine}

# 仅同步 schema 热更新相关表
canal.instance.filter.regex=${CANAL_MYSQL_DATABASE:-memory_engine}\\.memory_field,${CANAL_MYSQL_DATABASE:-memory_engine}\\.parse_rule,${CANAL_MYSQL_DATABASE:-memory_engine}\\.retrieve_rule,${CANAL_MYSQL_DATABASE:-memory_engine}\\.call_rule,${CANAL_MYSQL_DATABASE:-memory_engine}\\.capability_registry

canal.instance.mysql.slaveId=1234

# Kafka MQ
canal.serverMode=kafka
canal.mq.servers=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
canal.mq.topic=${KAFKA_CANAL_TOPIC:-canal-memory-engine}
canal.mq.flatMessage=true
canal.mq.canalBatchSize=50
canal.mq.canalGetTimeout=1000
